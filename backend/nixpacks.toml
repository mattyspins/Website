# Nixpacks Configuration for Railway
# This file tells Railway how to build and run your Node.js application

[phases.setup]
nixPkgs = ["nodejs-20_x", "postgresql"]

[phases.install]
cmds = ["npm ci --only=production"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma migrate deploy && node dist/index.js"